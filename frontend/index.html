<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guess The Number — Frontier</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bgCanvas"></canvas>
    <canvas id="confettiCanvas"></canvas>
    <div class="app">
      <header class="app-header">
        <div class="title">GUESS THE NUMBER</div>
        <div class="sub">I'm thinking of a number between <span id="min">1</span> and <span id="max">30</span></div>
      </header>

      <div class="board">
        <aside class="status">
          <h3>STATUS</h3>
          <div class="stat"><strong>Attempts</strong><span id="attempts">0</span></div>
          <div class="stat"><strong>High Score</strong><span id="highScore">—</span></div>
          <div class="stat"><strong>Lives</strong><div id="lives" class="lives"></div></div>
          <div class="theme-picker">
            <label for="themeSelect">Theme</label>
            <select id="themeSelect" aria-hidden="true" hidden>
              <option value="frontier">Frontier</option>
              <option value="ocean">Ocean</option>
              <option value="sunset">Sunset</option>
            </select>

            <div class="custom-select" id="customThemeSelect" tabindex="0" role="combobox" aria-controls="customThemeOptions" aria-expanded="false" aria-haspopup="listbox" aria-labelledby="customThemeTrigger">
              <div class="custom-select__trigger" id="customThemeTrigger" role="button" aria-live="polite" aria-label="Select theme">Frontier</div>
              <ul class="custom-select__options" id="customThemeOptions" role="listbox" aria-activedescendant="theme-frontier" tabindex="-1">
                <li id="theme-frontier" role="option" data-value="frontier" class="selected" aria-selected="true">Frontier</li>
                <li id="theme-ocean" role="option" data-value="ocean" aria-selected="false">Ocean</li>
                <li id="theme-sunset" role="option" data-value="sunset" aria-selected="false">Sunset</li>
              </ul>
            </div>
          </div>
        </aside>

        <main class="game">
          <div class="glass">
            <div class="big-number" id="display">?</div>
            <div id="feedback" class="feedback">Make your guess!</div>

            <div class="input-row">
              <input id="guessInput" type="number" min="1" max="30" placeholder="Enter your guess" />
              <button id="guessBtn" class="primary">GUESS! 🎯</button>
            </div>

            <div class="history">
              <h4>Guesses</h4>
              <ul id="historyList"></ul>
            </div>
            <button id="playAgain" class="secondary">Play again</button>
          </div>
        </main>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
